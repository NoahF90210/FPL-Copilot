name: Manual Model Retrain

on:
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      APP_ENV: production
      REPORTS_DIR: backend/reports
      MODEL_ARTIFACT_PATH: backend/reports/artifacts/latest_model.joblib
      EVALUATION_REPORT_PATH: backend/reports/latest_evaluation.json
      LATEST_PREDICTIONS_PATH: backend/reports/latest_predictions.json
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Initialize warehouse schema
        working-directory: backend
        run: python scripts/init_db.py
      - name: Retrain model from warehouse data
        working-directory: backend
        run: python scripts/train_model.py
      - name: Upload refreshed reports
        uses: actions/upload-artifact@v4
        with:
          name: weekly-model-report
          path: |
            backend/reports/latest_evaluation.json
            backend/reports/latest_evaluation.md

  <text x="410" y="330" fill="#00ff85" font-family="Arial, sans-serif" font-size="24" font-weight="800">MID</text>
  <text x="510" y="330" fill="#f87171" font-family="Arial, sans-serif" font-size="24" font-weight="800">FWD</text>

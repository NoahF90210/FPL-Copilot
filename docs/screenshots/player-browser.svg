  <text x="130" y="540" fill="#ffffff" font-family="Arial, sans-serif" font-size="26" font-weight="700">Top prediction rows</text>
  <text x="430" y="540" fill="#00ff85" font-family="Arial, sans-serif" font-size="26" font-weight="800">sorted desc</text>
  <text x="1040" y="540" fill="#ffffff" font-family="Arial, sans-serif" font-size="26" font-weight="700">FDR badge</text>

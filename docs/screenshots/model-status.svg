  <text x="128" y="432" fill="#b8b8b8" font-family="Arial, sans-serif" font-size="22">ownership, ICT/BPS</text>
  <text x="128" y="476" fill="#b8b8b8" font-family="Arial, sans-serif" font-size="22">fixture context</text>
  <rect x="526" y="282" width="388" height="300" rx="20" fill="#101010" stroke="#00ff85" stroke-opacity="0.35"/>
  <text x="558" y="338" fill="#ffffff" font-family="Arial, sans-serif" font-size="32" font-weight="800">Evaluation</text>

  <text x="988" y="432" fill="#b8b8b8" font-family="Arial, sans-serif" font-size="22">serving mode</text>
  <text x="988" y="476" fill="#b8b8b8" font-family="Arial, sans-serif" font-size="22">database fallback status</text>

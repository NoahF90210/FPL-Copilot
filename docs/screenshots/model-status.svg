  <text x="558" y="432" fill="#b8b8b8" font-family="Arial, sans-serif" font-size="22">RMSE 1.871</text>
  <text x="558" y="476" fill="#b8b8b8" font-family="Arial, sans-serif" font-size="22">GW31-35 validation</text>
  <rect x="956" y="282" width="388" height="300" rx="20" fill="#101010" stroke="#2a2a2a"/>
  <text x="988" y="338" fill="#ffffff" font-family="Arial, sans-serif" font-size="32" font-weight="800">Freshness</text>
